<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 252" width="580">

  <!-- Shadow -->
  <rect x="2" y="4" width="576" height="246" rx="10" fill="#000000" opacity="0.35"/>

  <!-- Editor window -->
  <rect x="0" y="0" width="576" height="246" rx="10" fill="#1e1e1e"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="576" height="32" rx="10" fill="#323233"/>
  <rect x="0" y="18" width="576" height="14" fill="#323233"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="16" r="5.5" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="5.5" fill="#febc2e"/>
  <circle cx="60" cy="16" r="5.5" fill="#28c840"/>

  <!-- Window title -->
  <text x="288" y="21" text-anchor="middle"
        font-family="'SF Mono','Monaco','Cascadia Code','Fira Code',monospace"
        font-size="11" fill="#cccccc">config.json — ~/.m0squared</text>

  <!-- Tab bar -->
  <rect x="0" y="32" width="576" height="28" fill="#252526"/>
  <line x1="0" y1="60" x2="576" y2="60" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Active tab -->
  <rect x="0" y="32" width="116" height="28" fill="#1e1e1e"/>
  <rect x="0" y="32" width="116" height="2" fill="#007acc"/>
  <text x="18" y="50"
        font-family="'SF Mono','Monaco','Cascadia Code','Fira Code',monospace"
        font-size="11.5" fill="#cccccc">config.json</text>
  <line x1="116" y1="32" x2="116" y2="60" stroke="#252526" stroke-width="1"/>

  <!-- Inactive tab -->
  <text x="130" y="50"
        font-family="'SF Mono','Monaco','Cascadia Code','Fira Code',monospace"
        font-size="11.5" fill="#6e6e6e">indicator.py</text>

  <!-- Line number gutter bg -->
  <rect x="0" y="60" width="44" height="186" fill="#1e1e1e"/>
  <line x1="44" y1="60" x2="44" y2="246" stroke="#2d2d2d" stroke-width="1"/>

  <!-- Content area bg -->
  <rect x="44" y="60" width="532" height="186" fill="#1e1e1e"/>

  <!-- Line 1: { -->
  <text x="14" y="82" text-anchor="middle"
        font-family="'SF Mono','Monaco','Cascadia Code','Fira Code',monospace"
        font-size="12" fill="#4e4e4e">1</text>
  <text x="58" y="82"
        font-family="'SF Mono','Monaco','Cascadia Code','Fira Code',monospace"
        font-size="12.5" fill="#d4d4d4">{</text>

  <!-- Line 2: "plan" -->
  <text x="14" y="104" text-anchor="middle"
        font-family="'SF Mono','Monaco','Cascadia Code','Fira Code',monospace"
        font-size="12" fill="#4e4e4e">2</text>
  <text x="58" y="104"
        font-family="'SF Mono','Monaco','Cascadia Code','Fira Code',monospace"
        font-size="12.5" fill="#d4d4d4" xml:space="preserve">  <tspan fill="#9cdcfe">"plan"</tspan><tspan fill="#d4d4d4">: </tspan><tspan fill="#ce9178">"auto"</tspan><tspan fill="#d4d4d4">,</tspan><tspan fill="#6a9955">          // "auto" | "pro" | "max" | "payg" | "free"</tspan></text>

  <!-- Line 3: "bar_width" -->
  <text x="14" y="126" text-anchor="middle"
        font-family="'SF Mono','Monaco','Cascadia Code','Fira Code',monospace"
        font-size="12" fill="#4e4e4e">3</text>
  <text x="58" y="126"
        font-family="'SF Mono','Monaco','Cascadia Code','Fira Code',monospace"
        font-size="12.5" fill="#d4d4d4" xml:space="preserve">  <tspan fill="#9cdcfe">"bar_width"</tspan><tspan fill="#d4d4d4">: </tspan><tspan fill="#b5cea8">20</tspan><tspan fill="#d4d4d4">,</tspan><tspan fill="#6a9955">             // width of the progress bar</tspan></text>

  <!-- Line 4: "codex" -->
  <text x="14" y="148" text-anchor="middle"
        font-family="'SF Mono','Monaco','Cascadia Code','Fira Code',monospace"
        font-size="12" fill="#4e4e4e">4</text>
  <text x="58" y="148"
        font-family="'SF Mono','Monaco','Cascadia Code','Fira Code',monospace"
        font-size="12.5" fill="#d4d4d4" xml:space="preserve">  <tspan fill="#9cdcfe">"codex"</tspan><tspan fill="#d4d4d4">: { </tspan><tspan fill="#9cdcfe">"session_token_limit"</tspan><tspan fill="#d4d4d4">: </tspan><tspan fill="#b5cea8">100000</tspan><tspan fill="#d4d4d4"> },</tspan></text>

  <!-- Line 5: "gemini" -->
  <text x="14" y="170" text-anchor="middle"
        font-family="'SF Mono','Monaco','Cascadia Code','Fira Code',monospace"
        font-size="12" fill="#4e4e4e">5</text>
  <text x="58" y="170"
        font-family="'SF Mono','Monaco','Cascadia Code','Fira Code',monospace"
        font-size="12.5" fill="#d4d4d4" xml:space="preserve">  <tspan fill="#9cdcfe">"gemini"</tspan><tspan fill="#d4d4d4">: { </tspan><tspan fill="#9cdcfe">"session_token_limit"</tspan><tspan fill="#d4d4d4">: </tspan><tspan fill="#b5cea8">100000</tspan><tspan fill="#d4d4d4"> }</tspan></text>

  <!-- Line 6: } -->
  <text x="14" y="192" text-anchor="middle"
        font-family="'SF Mono','Monaco','Cascadia Code','Fira Code',monospace"
        font-size="12" fill="#4e4e4e">6</text>
  <text x="58" y="192"
        font-family="'SF Mono','Monaco','Cascadia Code','Fira Code',monospace"
        font-size="12.5" fill="#d4d4d4">}</text>

  <!-- Status bar -->
  <rect x="0" y="228" width="576" height="18" fill="#007acc"/>
  <rect x="0" y="228" width="576" height="18" rx="0" fill="#007acc"/>
  <rect x="0" y="237" width="576" height="9" rx="0" fill="#007acc"/>
  <rect x="0" y="228" width="576" height="18" rx="10" fill="#007acc"/>
  <rect x="0" y="228" width="576" height="9" fill="#007acc"/>
  <text x="12" y="241"
        font-family="'SF Mono','Monaco','Cascadia Code','Fira Code',monospace"
        font-size="10" fill="#ffffff">JSON</text>
  <text x="288" y="241" text-anchor="middle"
        font-family="'SF Mono','Monaco','Cascadia Code','Fira Code',monospace"
        font-size="10" fill="#ffffffcc">~/.m0squared/config.json</text>
  <text x="564" y="241" text-anchor="end"
        font-family="'SF Mono','Monaco','Cascadia Code','Fira Code',monospace"
        font-size="10" fill="#ffffffcc">UTF-8</text>

